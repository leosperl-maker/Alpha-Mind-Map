<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="cc">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <!-- Purple background circle -->
  <circle cx="50" cy="50" r="50" fill="#7C5CE7"/>
  <!-- Upward inscribed triangle highlight: P0(50,3) P2(90.7,73.5) P4(9.3,73.5) -->
  <!-- This makes the Alpha/A shape subtly lighter -->
  <polygon points="50,3 90.7,73.5 9.3,73.5" fill="white" opacity="0.15" clip-path="url(#cc)"/>
  <!-- 6 camera aperture blade chord lines (Star-of-David pattern) -->
  <!-- B1: P0(50,3) → P2(90.7,73.5) -->
  <line x1="50" y1="3" x2="90.7" y2="73.5" stroke="white" stroke-width="3.5" stroke-linecap="round" clip-path="url(#cc)"/>
  <!-- B2: P1(90.7,26.5) → P3(50,97) -->
  <line x1="90.7" y1="26.5" x2="50" y2="97" stroke="white" stroke-width="3.5" stroke-linecap="round" clip-path="url(#cc)"/>
  <!-- B3: P2(90.7,73.5) → P4(9.3,73.5) horizontal -->
  <line x1="90.7" y1="73.5" x2="9.3" y2="73.5" stroke="white" stroke-width="3.5" stroke-linecap="round" clip-path="url(#cc)"/>
  <!-- B4: P3(50,97) → P5(9.3,26.5) -->
  <line x1="50" y1="97" x2="9.3" y2="26.5" stroke="white" stroke-width="3.5" stroke-linecap="round" clip-path="url(#cc)"/>
  <!-- B5: P4(9.3,73.5) → P0(50,3) -->
  <line x1="9.3" y1="73.5" x2="50" y2="3" stroke="white" stroke-width="3.5" stroke-linecap="round" clip-path="url(#cc)"/>
  <!-- B6: P5(9.3,26.5) → P1(90.7,26.5) horizontal -->
  <line x1="9.3" y1="26.5" x2="90.7" y2="26.5" stroke="white" stroke-width="3.5" stroke-linecap="round" clip-path="url(#cc)"/>
</svg>
